<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CHALLENGE: Change the title to your own AI app name! -->
  <title>Let's Build AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      /* CHALLENGE: Change the background and text colors to make it your own! */
      background-color: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      /* CHALLENGE: Change this accent color to your favorite color! */
      background-color: #7c3aed;
      padding: 16px 24px;
      text-align: center;
    }

    header h1 {
      font-size: 1.4rem;
      color: #ffffff;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .user-message {
      align-self: flex-end;
      /* CHALLENGE: Change this accent color to match your header! */
      background-color: #7c3aed;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .ai-message {
      align-self: flex-start;
      background-color: #2a2a4a;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .thinking {
      align-self: flex-start;
      color: #888;
      font-style: italic;
      padding: 12px 16px;
    }

    #input-area {
      display: flex;
      padding: 16px 24px;
      gap: 12px;
      background-color: #16162a;
      border-top: 1px solid #2a2a4a;
    }

    #message-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #3a3a5a;
      border-radius: 12px;
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
    }

    #message-input:focus {
      border-color: #7c3aed;
    }

    #send-button {
      padding: 12px 24px;
      /* CHALLENGE: Change the button color to match your theme! */
      background-color: #7c3aed;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    #send-button:hover {
      background-color: #6d28d9;
    }

    #send-button:disabled {
      background-color: #4a4a6a;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <!-- CHALLENGE: Change this to your AI's name! -->
    <h1>Let's Build AI</h1>
  </header>

  <div id="chat-container"></div>

  <div id="input-area">
    <input
      type="text"
      id="message-input"
      <!-- CHALLENGE: Change this placeholder text to something fun! -->
      placeholder="Type a message..."
      autocomplete="off"
    />
    <button id="send-button">Send</button>
  </div>

  <script>
    const chatContainer = document.getElementById("chat-container");
    const messageInput = document.getElementById("message-input");
    const sendButton = document.getElementById("send-button");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.classList.add("message", sender === "user" ? "user-message" : "ai-message");
      div.textContent = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showThinking() {
      const div = document.createElement("div");
      div.classList.add("thinking");
      div.id = "thinking-indicator";
      div.textContent = "Thinking...";
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeThinking() {
      const el = document.getElementById("thinking-indicator");
      if (el) el.remove();
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      addMessage(message, "user");
      messageInput.value = "";
      sendButton.disabled = true;
      showThinking();

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await response.json();

        removeThinking();

        if (data.reply) {
          addMessage(data.reply, "ai");
        } else {
          addMessage("Sorry, something went wrong.", "ai");
        }
      } catch (error) {
        removeThinking();
        addMessage("Could not reach the server. Is it running?", "ai");
      }

      sendButton.disabled = false;
      messageInput.focus();
    }

    // Send on button click
    sendButton.addEventListener("click", sendMessage);

    // Send on Enter key
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // Auto-focus input on page load
    messageInput.focus();
  </script>
</body>
</html>
